<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {

  --status-idea: #9a9080; --status-listo: #a0c47a;
}
body { background:var(--bg); color:var(--text); font-family:'DM Mono',monospace; min-height:100vh; padding:48px 32px; }
body::before { content:''; position:fixed; inset:0; background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='4'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.035'/%3E%3C/svg%3E"); pointer-events:none; z-index:0; }
.wrap { position:relative; z-index:1; max-width:1200px; margin:0 auto; }

header { margin-bottom:48px; }
h1 { font-family:'Syne',sans-serif; font-size:clamp(36px,5vw,60px); font-weight:800; letter-spacing:-0.03em; line-height:1; }
h1 em { font-family:'Instrument Serif',serif; font-style:italic; font-weight:400; color:var(--cat-negocio); }
.sub { font-size:10px; color:var(--text3); letter-spacing:0.15em; text-transform:uppercase; margin-top:12px; }

.legend { display:flex; flex-wrap:wrap; gap:8px 24px; margin-bottom:36px; padding-bottom:20px; border-bottom:1px solid var(--border); }
.li { display:flex; align-items:center; gap:6px; font-size:10px; letter-spacing:0.1em; text-transform:uppercase; color:var(--text2); }
.ld { width:8px; height:8px; border-radius:50%; flex-shrink:0; }

.stats { display:grid; grid-template-columns:repeat(4,1fr); gap:1px; background:var(--border); border:1px solid var(--border); margin-bottom:36px; border-radius:3px; overflow:hidden; }
.stat { background:var(--surface); padding:16px 20px; text-align:center; }
.sn { font-family:'Syne',sans-serif; font-size:30px; font-weight:800; line-height:1; margin-bottom:4px; }
.sl { font-size:9px; color:var(--text3); letter-spacing:0.12em; text-transform:uppercase; }

.filters { display:flex; flex-wrap:wrap; gap:6px; margin-bottom:28px; }
.fb { background:transparent; border:1px solid var(--border2); color:var(--text2); font-family:'DM Mono',monospace; font-size:10px; letter-spacing:0.1em; text-transform:uppercase; padding:6px 14px; cursor:pointer; border-radius:2px; transition:all .2s; }
.fb:hover,.fb.active { border-color:var(--cat-negocio); color:var(--cat-negocio); background:rgba(196,151,90,.06); }

.grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(300px,1fr)); gap:2px; }

.card { background:var(--surface); border:1px solid var(--border); padding:22px; cursor:pointer; transition:all .2s; position:relative; overflow:hidden; }
.card::before { content:''; position:absolute; top:0; left:0; width:3px; height:100%; background:var(--cc,var(--border2)); }
.card:hover { background:var(--surface2); border-color:var(--border2); transform:translateY(-2px); }
.card.hidden { display:none; }

.ctop { display:flex; justify-content:space-between; align-items:flex-start; margin-bottom:10px; }
.ccat { font-size:9px; letter-spacing:0.14em; text-transform:uppercase; color:var(--cc,var(--text3)); }
.cst { font-size:9px; letter-spacing:0.07em; text-transform:uppercase; padding:3px 8px; border-radius:2px; background:rgba(255,255,255,.04); border:1px solid var(--sc,var(--border2)); color:var(--sc,var(--text3)); white-space:nowrap; }
.cname { font-family:'Syne',sans-serif; font-size:17px; font-weight:700; letter-spacing:-0.02em; margin-bottom:6px; line-height:1.2; }
.cdesc { font-size:11px; color:var(--text2); line-height:1.6; margin-bottom:14px; }
.ctags { display:flex; flex-wrap:wrap; gap:4px; margin-bottom:14px; }
.tag { font-size:9px; padding:2px 7px; background:rgba(255,255,255,.04); border:1px solid var(--border); color:var(--text3); border-radius:2px; }
.cbot { display:flex; justify-content:space-between; align-items:center; padding-top:12px; border-top:1px solid var(--border); }
.cmoney { font-size:10px; color:var(--text3); display:flex; align-items:center; gap:6px; }
.md { width:6px; height:6px; border-radius:50%; }
.cpri { font-size:9px; letter-spacing:0.1em; color:var(--text3); text-transform:uppercase; }

/* MODAL */
.ov { position:fixed; inset:0; background:rgba(14,13,12,.88); z-index:100; display:flex; align-items:center; justify-content:center; padding:24px; opacity:0; pointer-events:none; transition:opacity .2s; backdrop-filter:blur(4px); }
.ov.open { opacity:1; pointer-events:all; }
.modal { background:var(--surface); border:1px solid var(--border2); max-width:500px; width:100%; max-height:82vh; overflow-y:auto; border-radius:3px; transform:translateY(10px); transition:transform .2s; }
.ov.open .modal { transform:translateY(0); }
.mh { padding:26px 26px 18px; border-bottom:1px solid var(--border); position:sticky; top:0; background:var(--surface); }
.mcat { font-size:9px; letter-spacing:0.14em; text-transform:uppercase; margin-bottom:5px; }
.mname { font-family:'Syne',sans-serif; font-size:22px; font-weight:800; letter-spacing:-0.02em; }
.mcls { position:absolute; top:20px; right:20px; background:none; border:1px solid var(--border2); color:var(--text2); font-family:'DM Mono',monospace; font-size:10px; padding:4px 10px; cursor:pointer; border-radius:2px; transition:all .2s; }
.mcls:hover { border-color:var(--text2); color:var(--text); }
.mb { padding:22px 26px 26px; }
.ms { margin-bottom:18px; }
.mst { font-size:9px; letter-spacing:0.14em; text-transform:uppercase; color:var(--text3); margin-bottom:7px; padding-bottom:5px; border-bottom:1px solid var(--border); }
.ms p { font-size:11px; color:var(--text2); line-height:1.7; }
.ml { list-style:none; }
.ml li { font-size:11px; color:var(--text2); padding:5px 0; border-bottom:1px solid var(--border); display:flex; gap:8px; }
.ml li::before { content:'—'; color:var(--text3); flex-shrink:0; }
.mbadge { display:inline-flex; align-items:center; gap:6px; font-size:10px; padding:5px 10px; border-radius:2px; margin-top:8px; }
.mbadge.si { background:rgba(160,196,122,.08); border:1px solid rgba(160,196,122,.3); color:#a0c47a; }
.mbadge.pot { background:rgba(196,151,90,.08); border:1px solid rgba(196,151,90,.3); color:var(--cat-negocio); }
.mbadge.no { background:rgba(90,84,72,.2); border:1px solid var(--border); color:var(--text3); }

@media(max-width:600px){ body{padding:24px 16px;} .grid{grid-template-columns:1fr;} .stats{grid-template-columns:repeat(2,1fr);} }

    mon:'Podría publicarse como herramienta de diseño o venderse como template.',
    files:['index.html','app.js','style.css'] },
];

const CC = { negocio:'var(--cat-negocio)', app:'var(--cat-app)', creativo:'var(--cat-creativo)', personal:'var(--cat-personal)', externo:'var(--cat-externo)' };
const SC = { activo:'var(--status-activo)', pausa:'var(--status-pausa)', idea:'var(--status-idea)', listo:'var(--status-listo)' };
const MC = { pot:'#c4975a', si:'#a0c47a', no:'var(--text3)' };

function render(f='all') {
  const g = document.getElementById('grid');
  g.innerHTML = '';
  const vis = f==='all' ? P : P.filter(p=>p.cat===f);
  vis.forEach(p => {
    const d = document.createElement('div');
    d.className = 'card';
    d.style.setProperty('--cc', CC[p.cat]);
    d.style.setProperty('--sc', SC[p.st]);
    d.innerHTML = `
      <div class="ctop"><span class="ccat">${p.catL}</span><span class="cst">${p.stL}</span></div>
      <div class="cname">${p.name}</div>
      <div class="cdesc">${p.desc}</div>
      <div class="ctags">${p.tags.map(t=>`<span class="tag">${t}</span>`).join('')}</div>
      <div class="cbot">
        <span class="cmoney"><span class="md" style="background:${MC[p.money]}"></span>${p.moneyL}</span>
        <span class="cpri">↑ ${p.pri}</span>
      </div>`;
    d.onclick = () => { if (window.parent && window.parent !== window && window.parent.StudioProyectos) { window.parent.StudioProyectos.openDetail(p.id); } else { open(p); } };
    g.appendChild(d);
  });
  const all = f==='all' ? P : vis;
  document.getElementById('s0').textContent = all.length;
  document.getElementById('s1').textContent = all.filter(p=>p.st==='activo'||p.st==='listo').length;
  document.getElementById('s2').textContent = all.filter(p=>p.money!=='no').length;
  document.getElementById('s3').textContent = all.filter(p=>p.st==='pausa'||p.st==='idea').length;
}

function open(p) {
  document.getElementById('mc').textContent = p.catL;
  document.getElementById('mc').style.color = CC[p.cat];
  document.getElementById('mn').textContent = p.name;
  const bc = p.money==='si'?'si':p.money==='pot'?'pot':'no';
  const bl = p.money==='si'?'✓ Ya genera $':p.money==='pot'?'◎ Potencial de $':'— Sin modelo $ aún';
  document.getElementById('mbody').innerHTML = `
    <div class="ms"><div class="mst">Avance</div><p>${p.av}</p><span class="mbadge ${bc}">${bl}</span></div>
    <div class="ms"><div class="mst">Cómo genera $</div><p>${p.mon}</p></div>
    <div class="ms"><div class="mst">Pendientes clave</div><ul class="ml">${p.pend.map(x=>`<li>${x}</li>`).join('')}</ul></div>
    ${p.files.length?`<div class="ms"><div class="mst">Archivos</div><ul class="ml">${p.files.map(x=>`<li>${x}</li>`).join('')}</ul></div>`:''}
  `;
  document.getElementById('ov').classList.add('open');
}

function cls(e) {
  if (!e || e.target===document.getElementById('ov') || e.currentTarget.tagName==='BUTTON')
    document.getElementById('ov').classList.remove('open');
}

document.querySelectorAll('.fb').forEach(b => b.onclick = () => {
  document.querySelectorAll('.fb').forEach(x=>x.classList.remove('active'));
  b.classList.add('active');
  render(b.dataset.f);
});

render();
</script>
</body>
</html>
